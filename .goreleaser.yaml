version: 2
project_name: vault-sync

before:
  hooks:
    - go mod tidy

builds:
  - id: vault
    binary: vault
    main: ./cmd/vault
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: vault-macos
    binary: vault
    main: ./cmd/vault
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: vaultd
    binary: vaultd
    main: ./cmd/vaultd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: vaultd-macos
    binary: vaultd
    main: ./cmd/vaultd
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: vault
    ids:
      - vault
      - vault-macos
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

  - id: vaultd
    ids:
      - vaultd
      - vaultd-macos
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_daemon_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

nfpms:
  - id: vault
    package_name: vault-sync
    ids:
      - vault
      - vaultd
      - vault-macos
      - vaultd-macos
    vendor: VaultSync
    homepage: https://vaultsync.dev
    maintainer: Shyam Verma <ishyverma@gmail.com>
    description: A fast, local-first note manager with multi-backend sync
    license: MIT
    formats:
      - deb
      - rpm
      - apk

brews:
  - name: vault-sync
  - name: vault-sync
    ids:
      - vault
      - vaultd
      - vault-macos
      - vaultd-macos
    repository:
      owner: ishyverma
      name: homebrew-tap
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: https://vaultsync.dev
    description: A fast, local-first note manager with multi-backend sync (Obsidian, Notion, Git)
    license: MIT
    test: |
      system "#{bin}/vault version"
    install: |
      bin.install "vault"
      bin.install "vaultd"

aurs:
  - name: vault-sync-bin
    homepage: https://vaultsync.dev
    description: A fast, local-first note manager with multi-backend sync (Obsidian, Notion, Git)
    license: MIT
    private_key: "{{ .Env.AUR_PRIVATE_KEY }}"
    package: |-
      install -Dm755 vault "${pkgdir}/usr/bin/vault"
      install -Dm755 vaultd "${pkgdir}/usr/bin/vaultd"

source:
  enabled: true

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - merge conflict
      - Merge pull request
      - Merge remote-tracking branch

release:
  github:
    owner: ishyverma
    name: vault-sync
  draft: true
  prerelease: auto
  header: |
    ## VaultSync {{ .Version }} ({{ .Date }})

    ### Installation

    ```sh
    curl -sf https://vaultsync.dev/install | sh
    ```

    Or via Homebrew:
    ```sh
    brew install ishyverma/tap/vault-sync
    ```

    ### Changes
  footer: |

    ---
    *Automatically generated by goreleaser*

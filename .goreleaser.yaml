version: 2
project_name: vault-sync

before:
  hooks:
    - go mod tidy

builds:
  - id: vault
    binary: vault
    main: ./cmd/vault
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: vaultd
    binary: vaultd
    main: ./cmd/vaultd
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: vault
    ids:
      - vault
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

  - id: vaultd
    ids:
      - vaultd
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_daemon_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

nfpms:
  - id: vault
    package_name: vault-sync
    ids:
      - vault
      - vaultd
    vendor: VaultSync
    homepage: https://vaultsync.dev
    maintainer: Shyam Verma <ishyverma@gmail.com>
    description: A fast, local-first note manager with multi-backend sync
    license: MIT
    formats:
      - deb
      - rpm
      - apk

source:
  enabled: true

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - merge conflict
      - Merge pull request
      - Merge remote-tracking branch

release:
  github:
    owner: ishyverma
    name: vault-sync
  draft: false
  prerelease: auto
  header: |
    ## VaultSync {{ .Version }} ({{ .Date }})

    ### Installation

    ```sh
    curl -sf https://vaultsync.dev/install | sh
    ```

    Or via Homebrew:
    ```sh
    brew install ishyverma/tap/vault-sync
    ```

    ### Changes
  footer: |

    ---
    *Automatically generated by goreleaser*
